<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net-Diagnostic Tool v1.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 450px; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 1.5rem; text-align: center; }
        form { display: flex; flex-direction: column; }
        label { margin-bottom: 0.5rem; font-weight: bold; color: #555; }
        input { padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        button { padding: 0.8rem; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #0056b3; }
        pre { background: #1e1e1e; color: #00ff00; padding: 1rem; border-radius: 4px; overflow-x: auto; font-size: 0.9rem; margin-top: 1.5rem; width: 100%; box-sizing: border-box; }
        .footer { margin-top: 2rem; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOC Diagnostic Tool</h1>
        <form action="/api/ping" method="post">
            <label for="target">Remote Host Address</label>
            <input type="text" id="target" name="target" placeholder="e.g., google.com" value="{{ target if target else '' }}" required>
            <button type="submit">Execute Connectivity Check</button>
        </form>

        {% if output %}
        <pre>{{ output }}</pre>
        {% endif %}
    </div>
    <div class="footer">
        © 2026 NetOps Solutions Ltd. - Authorized Personnel Only
    </div>
</body>
</html>
